<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>
  <rect width="400" height="300" rx="18" fill="url(#bg)"/>
  <rect x="20" y="20" width="360" height="260" rx="14" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="200" y="135" text-anchor="middle" font-size="72" filter="url(#shadow)">🍅</text>
  <text x="200" y="200" text-anchor="middle" font-family="'Outfit',Segoe UI,sans-serif" font-size="26" font-weight="600" fill="white" filter="url(#shadow)">Tomatoes</text>
  <text x="200" y="230" text-anchor="middle" font-family="'Outfit',Segoe UI,sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">SoilScope Crop Database</text>
</svg>